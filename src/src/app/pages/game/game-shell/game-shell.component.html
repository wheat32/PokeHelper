@if (gamePair(); as gp) {
  <div class="game-shell {{ gp.themeClass }}">
    <!-- Game Header -->
    <div class="game-header">
      <div class="container-xl py-4 d-flex align-items-center gap-3">
        @if (gp.icons && gp.iconColors) {
          <app-split-icon
            [icons]="gp.icons"
            [colors]="gp.iconColors"
            [size]="60"
            [borderRadius]="8"
          />
        } @else {
          <div class="header-icon-wrapper">
            <i class="bi bi-{{ gp.icon }} header-icon"></i>
          </div>
        }
        <div>
          <h1 class="game-title mb-0">
            <a class="game-title-link" [routerLink]="['/', gp.pairId]">{{ gp.displayName }}</a>
          </h1>
          <p class="game-gen mb-0">Generation {{ gp.generation }} · Pokémon Guide</p>
        </div>
      </div>
    </div>

    <!-- Sub-navigation tabs -->
    <div class="game-subnav">
      <div class="container-xl">
        <ul class="nav nav-tabs border-0">
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/', gp.pairId, 'version-exclusives']"
               routerLinkActive="active">
              <i class="bi bi-star-fill me-2"></i>Version Exclusives
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/', gp.pairId, 'trade-evolutions']"
               routerLinkActive="active">
              <i class="bi bi-arrow-left-right me-2"></i>Trade Evolutions
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/', gp.pairId, 'starters']"
               routerLinkActive="active">
              <i class="bi bi-egg-fill me-2"></i>Starters
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/', gp.pairId, 'unobtainables']"
               routerLinkActive="active">
              <i class="bi bi-slash-circle me-2"></i>Unobtainables
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/', gp.pairId, 'obedience']"
               routerLinkActive="active">
              <i class="bi bi-shield-check me-2"></i>Obedience
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Page content -->
    <div class="container-xl py-4">
      <router-outlet />
    </div>
  </div>
}
