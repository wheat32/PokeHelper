<div class="trade-card card shadow-sm"
     [class.game-accent-border]="!accentGradient"
     [class.trade-card-gradient-border]="!!accentGradient"
     [ngStyle]="accentGradient ? {'--trade-gradient': accentGradient} : {}">
  <div class="card-body p-3">
    <div class="d-flex align-items-center justify-content-between gap-2">

      <!-- Pre-evolution -->
      <div class="pokemon-col d-flex flex-column align-items-center text-center">
        <div class="sprite-wrapper mb-1">
          <img [src]="fromSpriteUrl" [alt]="evolution.fromName"
               class="pokemon-sprite"
               (error)="onSpriteError($event, evolution.fromId)">
        </div>
        <span class="pokedex-number">{{ fromPokedexNumber }}</span>
        <a [href]="fromBulbapediaUrl" target="_blank" rel="noopener noreferrer"
           class="bulbapedia-link pokemon-name mt-1">
          {{ evolution.fromName }}
          <i class="bi bi-box-arrow-up-right ms-1 ext-link-icon"></i>
        </a>
      </div>

      <!-- Trade arrow + item -->
      <div class="trade-info d-flex flex-column align-items-center gap-1 flex-shrink-0">
        <div class="trade-arrow">
          <i class="bi bi-arrow-left-right"></i>
          <span class="trade-label">Trade</span>
        </div>
        @if (evolution.tradeItem) {
          <span class="trade-item-badge badge">
            <i class="bi bi-bag-fill me-1"></i>{{ evolution.tradeItem }}
          </span>
        }
        @if (evolution.notes) {
          <span class="version-note badge">
            <i class="bi bi-info-circle me-1"></i>{{ evolution.notes }}
          </span>
        }
      </div>

      <!-- Post-evolution -->
      <div class="pokemon-col d-flex flex-column align-items-center text-center">
        <div class="sprite-wrapper mb-1">
          <img [src]="toSpriteUrl" [alt]="evolution.toName"
               class="pokemon-sprite"
               (error)="onSpriteError($event, evolution.toId)">
        </div>
        <span class="pokedex-number">{{ toPokedexNumber }}</span>
        <a [href]="toBulbapediaUrl" target="_blank" rel="noopener noreferrer"
           class="bulbapedia-link pokemon-name mt-1">
          {{ evolution.toName }}
          <i class="bi bi-box-arrow-up-right ms-1 ext-link-icon"></i>
        </a>
      </div>

    </div>
  </div>
</div>
